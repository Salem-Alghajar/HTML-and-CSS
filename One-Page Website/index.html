<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem Alghajar | Digital Space</title>
    <style>
        /* Unique Color Palette: Midnight & Neon */
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-cyan: #22d3ee;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.7;
        }

        /* Glassmorphism Navigation */
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            text-align: center;
        }

        header h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Sections */
        section {
            padding: 100px 5%;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h2::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: rgba(34, 211, 238, 0.3);
        }

        /* Visual Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .img-card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .img-card:hover img {
            transform: scale(1.1);
        }

        /* Video Styling */
        .video-wrapper {
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--accent-cyan);
        }

        /* Contact Form */
        form {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            display: grid;
            gap: 20px;
        }

        input, textarea {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-cyan);
        }

        button {
            background: var(--accent-cyan);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px var(--accent-cyan);
            transform: translateY(-2px);
        }

        footer {
            padding: 50px;
            text-align: center;
            border-top: 1px solid #334155;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#work">Work</a>
        <a href="#video">Vibe</a>
        <a href="#contact">Connect</a>
    </nav>

    <header id="home">
        <h1>Salem Alghajar</h1>
        <p style="color: var(--accent-cyan); letter-spacing: 5px;">DEVELOPER // DESIGNER // STUDENT</p>
    </header>

    <section id="work">
        <h2>Visual Portfolio</h2>
        <div class="image-grid">
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80" alt="Cyber Network">
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=800&q=80" alt="Retro Tech">
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&w=800&q=80" alt="Clean Code">
            </div>
        </div>
    </section>

    <section id="video">
        <h2>Cinematic Inspiration</h2>
        <div class="video-wrapper">
            <div style="position:relative; padding-bottom:56.25%;">
                <iframe 
                    style="position:absolute; top:0; left:0; width:100%; height:100%;" 
                    src="https://www.youtube.com/embed/vPhN_7SgXmI?autoplay=1&mute=1&loop=1&playlist=vPhN_7SgXmI" 
                    title="Atmospheric Cinematic Video" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </section>

    <section id="contact">
        <h2>Start a Project</h2>
        <form action="#">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Digital Address (Email)" required>
            <textarea rows="6" placeholder="What's on your mind?"></textarea>
            <button type="submit">TRANSMIT MESSAGE</button>
        </form>
    </section>

    <footer>
        <p>Designed by Salem Alghajar &copy; 2026</p>
        <p style="font-size: 0.7rem; margin-top: 10px;">EST. 2026 | BUILT FOR THE FUTURE</p>
    </footer>

</body>
</html>

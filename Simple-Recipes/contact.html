<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Salem Alghajar</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --accent-cyan: #22d3ee; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; padding-top: 100px; }
        .navbar { background: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(34, 211, 238, 0.2); }
        .nav-link { font-family: 'Syncopate', sans-serif; font-size: 0.8rem; letter-spacing: 2px; color: white !important; }
        .card { background-color: #1e293b; border: 1px solid var(--accent-cyan); }
        .form-control, .form-select { background: transparent; border: 1px solid #334155; color: white; }
        .form-control:focus { background: rgba(34, 211, 238, 0.05); color: white; border-color: var(--accent-cyan); box-shadow: none; }
        footer { color: #94a3b8; padding: 2rem 0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand text-info fw-bold" href="index.html">SALEM.DEV</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#showtimes">SHOWTIMES</a></li>
                    <li class="nav-item"><a class="nav-link active text-info" href="contact.html">CONTACT</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg p-4">
                    <h2 class="text-info font-syncopate text-center mb-4">CONTACT SALEM</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">NAME</label>
                            <input type="text" class="form-control" placeholder="Your Name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">EMAIL</label>
                            <input type="email" class="form-control" placeholder="Email Address" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">MESSAGE</label>
                            <textarea class="form-control" rows="5" placeholder="How can Salem help you?"></textarea>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-info px-5 fw-bold">SEND MESSAGE</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center mt-5">
        <p>&copy; 2026 Designed by Salem Alghajar</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
